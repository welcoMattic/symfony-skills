## Metadata for each skill — used by install.sh to generate agent-specific formats
##
## Fields:
##   name:        Skill identifier (kebab-case)
##   description: When/why to use this skill (used for auto-invocation)
##   args:        Argument hint for user-facing skills (skill parameters, not CLI flags)
##   auto:        true = background knowledge, not user-invocable (default: false)
##
## MakerBundle equivalents are noted where they exist. These skills generate code
## directly — they do NOT run make: commands (which are interactive). The skill
## follows the same conventions MakerBundle would produce.

skills:
  cli-conventions:
    name: cli-conventions
    description: >
      Background knowledge for Symfony CLI conventions. When a Symfony project is detected,
      always use the Symfony CLI binary as prefix for all relevant commands.
    auto: true

  configuration:
    name: configuration
    description: >
      Background knowledge for Symfony configuration conventions. Teaches when to use
      environment variables, parameters, constants, and secrets.
    auto: true

  templates:
    name: templates
    description: >
      Background knowledge for Twig template conventions. Naming (snake_case),
      fragments (underscore prefix), variables, and AssetMapper.
    auto: true

  init:
    name: init
    description: >
      Initialize a new Symfony project using the Symfony CLI.
      Runs: symfony new <name> [flags]
    args: "[project-name] [--webapp] [--api] [--docker] [--php=version] [--version=version]"

  controller:
    name: controller
    description: >
      Create a Symfony controller with routes and actions.
      MakerBundle equivalent: make:controller (single controller), make:crud (CRUD).
    args: "[ControllerName]"

  entity:
    name: entity
    description: >
      Create a Doctrine ORM entity with properties, relationships, and repository.
      MakerBundle equivalent: make:entity (supports --api-resource flag for API Platform).
    args: "[EntityName] [field:type ...]"

  form:
    name: form
    description: >
      Create a Symfony FormType class for an entity or a standalone form.
      MakerBundle equivalent: make:form.
    args: "[EntityName|FormName]"

  command:
    name: command
    description: >
      Create an invokable Symfony Console command with #[AsCommand], #[Argument], #[Option].
      MakerBundle equivalent: make:command.
    args: "[command:name]"

  service:
    name: service
    description: >
      Create a Symfony service class with dependency injection and proper structure.
      No MakerBundle equivalent — services are plain PHP classes, no scaffolding needed.
    args: "[ServiceName]"

  test:
    name: test
    description: >
      Generate PHPUnit tests for Symfony components — unit, functional (WebTestCase),
      or integration tests. Detects the target class and generates appropriate test type.
      MakerBundle equivalents: make:test, make:unit-test, make:functional-test.
    args: "[ClassName] [--unit|--functional|--integration]"

  migration:
    name: migration
    description: >
      Manage Doctrine migrations — generate, run, diff, rollback.
      Commands: doctrine:migrations:diff, doctrine:migrations:migrate, etc.
      MakerBundle equivalent: make:migration (wraps doctrine:migrations:diff).
    args: "[generate|migrate|rollback|status|diff]"

  voter:
    name: voter
    description: >
      Create a Symfony Security Voter for fine-grained authorization logic.
      MakerBundle equivalent: make:voter.
    args: "[EntityName]"

  event:
    name: event
    description: >
      Create a Symfony Event class and its EventListener or EventSubscriber.
      MakerBundle equivalent: make:listener (also aliased as make:subscriber).
    args: "[EventName]"

  api:
    name: api
    description: >
      Configure an API Platform resource on an existing Doctrine entity — add
      #[ApiResource], operations, serialization groups, and filters.
      No dedicated MakerBundle command — use make:entity --api-resource to scaffold,
      or add attributes manually to an existing entity.
    args: "[EntityName]"
